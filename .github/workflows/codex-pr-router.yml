name: Codex PR Router

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted, edited]
  pull_request_review_comment:
    types: [created, edited]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  DEFAULT_WORKER: mac
  CODEX_AUTOMERGE_DOCS_ONLY: "true"

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Classify PR and labels
        id: classify
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
              || context.payload.review?.pull_request
              || context.payload.comment?.pull_request;
            if (!pr) {
              core.info("No pull request payload found.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const number = pr.number;
            const labels = new Set((pr.labels || []).map((label) => label.name));

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: number,
              per_page: 100
            });
            const filenames = files.map((file) => file.filename);
            core.info(`Files: ${filenames.join(", ")}`);

            const lowRisk = (path) => (
              path === "README.md"
              || path.startsWith("docs/")
              || path.startsWith("progress/")
              || (path.endsWith(".md") && !path.startsWith(".github/"))
            );
            const docsOnly = filenames.length > 0 && filenames.every(lowRisk);
            const trustedAuthor = ["OWNER", "MEMBER", "COLLABORATOR"].includes(pr.author_association || "");
            const headRef = pr.head?.ref || "";
            const addLabels = new Set();
            const removeLabels = new Set();

            if (headRef.startsWith("mac/")) {
              addLabels.add("origin:mac");
              removeLabels.add("origin:windows");
            } else if (headRef.startsWith("win/") || headRef.startsWith("windows/")) {
              addLabels.add("origin:windows");
              removeLabels.add("origin:mac");
            } else if (!labels.has("origin:mac") && !labels.has("origin:windows")) {
              addLabels.add(process.env.DEFAULT_WORKER === "windows" ? "origin:windows" : "origin:mac");
            }

            if (docsOnly) {
              addLabels.add("codex-automerge-safe");
              removeLabels.add("needs-human-merge");
              removeLabels.add("codex-autofix");
            } else {
              addLabels.add("codex-autofix");
              addLabels.add("needs-human-merge");
              removeLabels.add("codex-automerge-safe");
            }

            for (const name of removeLabels) {
              if (!labels.has(name)) continue;
              try {
                await github.rest.issues.removeLabel({owner, repo, issue_number: number, name});
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

            const labelsToAdd = [...addLabels].filter((name) => !labels.has(name));
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: number,
                labels: labelsToAdd
              });
            }

            core.setOutput("docs_only", docsOnly ? "true" : "false");
            core.setOutput("trusted_author", trustedAuthor ? "true" : "false");
            core.setOutput("pr_number", String(number));

      - name: Enable docs-only auto merge
        if: steps.classify.outputs.docs_only == 'true' && steps.classify.outputs.trusted_author == 'true' && env.CODEX_AUTOMERGE_DOCS_ONLY == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.classify.outputs.pr_number }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --auto --delete-branch || \
            echo "Auto-merge could not be enabled yet. Required checks or repository settings may be missing."
